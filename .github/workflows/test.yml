name: tests

# Runs pytest on every push to any branch and on every PR. Distinct from
# release.yml, which is tag-driven and produces the .exe / release zip.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install plugin + test deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run pytest
        shell: pwsh
        run: python -m pytest

      # Regression guard for issue #9: without the explicit
      # `git update-index --chmod=+x bin/vdesktop.exe` step in release.yml,
      # the committed binary lands on the release branch with mode 0644 and
      # MCP hosts under WSL fail to spawn it (EACCES). If anyone removes
      # that step, this check fails the PR rather than shipping a broken
      # release.
      - name: Verify release.yml stamps bin/vdesktop.exe as executable
        shell: bash
        run: |
          if ! grep -F 'git update-index --chmod=+x bin/vdesktop.exe' \
                 .github/workflows/release.yml; then
            echo "::error::release.yml is missing 'git update-index --chmod=+x bin/vdesktop.exe' — see issue #9."
            exit 1
          fi
