name: dispatch-to-marketplace

# Triggert auf "Release published" (nicht auf push:tags), weil:
#   - push:tags würde die Workflow-Definition im Tag-Commit suchen
#   - der Tag liegt auf dem orphan release-Branch, der kein .github/ hat
#   - release:published nutzt dagegen die Workflow-Definition von main
on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify release was created on the release branch
        run: |
          TARGET="${{ github.event.release.target_commitish }}"
          if [ "$TARGET" != "release" ]; then
            echo "ERROR: release target is '$TARGET', expected 'release'."
            echo "Releases must be created on the 'release' branch."
            exit 1
          fi

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release

      - name: Parse version from tag
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Read plugin metadata from plugin.json
        id: meta
        shell: bash
        run: |
          DESC=$(jq -r '.description' .claude-plugin/plugin.json)
          NAME=$(jq -r '.name'        .claude-plugin/plugin.json)
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}"        >> "$GITHUB_OUTPUT"

      - name: Dispatch to agent-marketplace
        env:
          GH_PAT:  ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          NAME:    ${{ steps.meta.outputs.name }}
          DESC:    ${{ steps.meta.outputs.description }}
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Seretos/agent-marketplace/dispatches \
            -d @- <<EOF
          {
            "event_type": "plugin-release",
            "client_payload": {
              "name":        "${NAME}",
              "description": "${DESC}",
              "source":      "Seretos/agent-vdesktop",
              "category":    "mcp",
              "version":     "${VERSION}"
            }
          }
          EOF
