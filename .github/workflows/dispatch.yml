name: dispatch-to-marketplace

# Triggers:
#   - release:published — primary path, fires when a release is published on
#     the release branch from the GitHub UI. The workflow definition is read
#     from the default branch (main), so it works even though the release-
#     branch commit itself has no .github/ directory.
#   - workflow_dispatch — manual fallback for re-running against an existing
#     release (e.g. if GitHub's release event delivery missed it).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to dispatch (e.g. v0.1.0)"
        required: true
        type: string

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag from event
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            TARGET="${{ github.event.release.target_commitish }}"
            if [ "$TARGET" != "release" ]; then
              echo "ERROR: release target is '$TARGET', expected 'release'."
              echo "Releases must be created on the 'release' branch."
              exit 1
            fi
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release

      - name: Read plugin metadata from plugin.json
        id: meta
        shell: bash
        run: |
          DESC=$(jq -r '.description' .claude-plugin/plugin.json)
          NAME=$(jq -r '.name'        .claude-plugin/plugin.json)
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}"        >> "$GITHUB_OUTPUT"

      - name: Dispatch to agent-marketplace
        env:
          GH_PAT:  ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          NAME:    ${{ steps.meta.outputs.name }}
          DESC:    ${{ steps.meta.outputs.description }}
          VERSION: ${{ steps.tag.outputs.version }}
        shell: bash
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Seretos/agent-marketplace/dispatches \
            -d @- <<EOF
          {
            "event_type": "plugin-release",
            "client_payload": {
              "name":        "${NAME}",
              "description": "${DESC}",
              "source":      "Seretos/agent-vdesktop",
              "category":    "mcp",
              "version":     "${VERSION}"
            }
          }
          EOF
